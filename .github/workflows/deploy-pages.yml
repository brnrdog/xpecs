name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "packages/**"
      - "specs/**"
      - "tokens/**"
      - "traits/**"
      - "responsive/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install the whole workspace so the website can resolve @xpecs/*.
      - name: Install
        run: npm ci

      # OCaml toolchain for the reativa (Melange) examples rendered in the
      # website's "Reativa" tab. Kept out of the local build (opam/melange
      # aren't needed there), but compiled here so the deployed site ships the
      # real bundle instead of the checked-in placeholder.
      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
          dune-cache: true

      - name: Install Melange toolchain + reativa
        run: |
          opam install -y dune melange mlx
          opam pin add -y reativa https://github.com/brnrdog/reativa.git

      - name: Build reativa bundle (OCaml → esbuild)
        run: npm run reativa --workspace xpecs-website

      # Build the packages the website consumes (tokens → xote), then the site.
      - name: Build packages
        run: npm run build:packages

      - name: Build website
        run: npm run build --workspace xpecs-website
        env:
          # Project site path = repository name.
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Add SPA fallback and disable Jekyll
        run: |
          cp website/dist/index.html website/dist/404.html
          touch website/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
